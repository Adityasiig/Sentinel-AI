<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pulse · Fleet Control</title>
<style>
  :root{
    --bg:#070b14; --bg2:#0b1120; --panel:rgba(20,27,45,.72); --panel-solid:#141b2d;
    --line:rgba(255,255,255,.07); --txt:#e6ecfb; --muted:#8291b0; --dim:#5b6885;
    --ok:#28d17c; --warn:#f5b942; --crit:#ff5470; --unknown:#5b6885;
    --accent:#5b8cff; --accent2:#9b6bff; --glow:0 0 24px;
    --radius:16px; --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg); color:var(--txt); font-family:var(--font);
    font-size:14px; line-height:1.5; overflow-x:hidden; position:relative;
  }
  /* animated aurora backdrop */
  body::before{
    content:""; position:fixed; inset:-30%; z-index:-2;
    background:
      radial-gradient(40% 40% at 20% 20%, rgba(91,140,255,.16), transparent 60%),
      radial-gradient(45% 45% at 80% 15%, rgba(155,107,255,.14), transparent 60%),
      radial-gradient(50% 50% at 60% 90%, rgba(40,209,124,.10), transparent 60%);
    filter:blur(30px); animation:drift 22s ease-in-out infinite alternate;
  }
  body::after{
    content:""; position:fixed; inset:0; z-index:-1; pointer-events:none;
    background:linear-gradient(180deg,rgba(7,11,20,.2),rgba(7,11,20,.85));
  }
  @keyframes drift{
    0%{transform:translate3d(0,0,0) scale(1)}
    100%{transform:translate3d(-4%,3%,0) scale(1.08)}
  }

  /* header */
  header{
    display:flex; align-items:center; gap:16px; padding:20px 30px;
    border-bottom:1px solid var(--line); backdrop-filter:blur(12px);
    position:sticky; top:0; z-index:10; background:rgba(7,11,20,.55);
  }
  .logo{display:flex; align-items:center; gap:12px; font-weight:700; font-size:19px; letter-spacing:.4px}
  .beat{width:12px;height:12px;border-radius:50%;background:var(--ok);
        box-shadow:var(--glow) var(--ok); animation:beat 1.6s ease-in-out infinite}
  @keyframes beat{0%,100%{transform:scale(.75);opacity:.6}50%{transform:scale(1.25);opacity:1}}
  .logo span{background:linear-gradient(90deg,var(--accent),var(--accent2));
             -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent}
  .fleet-pill{margin-left:6px;padding:5px 14px;border-radius:999px;font-size:12px;font-weight:700;
              letter-spacing:.5px;text-transform:uppercase;border:1px solid var(--line)}
  .spacer{flex:1}
  .meta{display:flex;gap:22px;align-items:center;color:var(--muted);font-size:12.5px}
  .meta b{color:var(--txt);font-variant-numeric:tabular-nums}
  .live{display:flex;align-items:center;gap:7px}
  .live i{width:8px;height:8px;border-radius:50%;background:var(--ok);box-shadow:var(--glow) var(--ok);
          animation:beat 1.6s ease-in-out infinite}

  main{max-width:1320px;margin:0 auto;padding:28px 30px 80px}

  /* KPI row */
  .kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:26px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
       padding:18px 20px;position:relative;overflow:hidden;backdrop-filter:blur(10px);
       transition:transform .25s ease,border-color .25s ease}
  .kpi:hover{transform:translateY(-3px);border-color:rgba(255,255,255,.16)}
  .kpi .label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.6px}
  .kpi .num{font-size:34px;font-weight:800;margin-top:8px;font-variant-numeric:tabular-nums;
            line-height:1}
  .kpi .bar{position:absolute;left:0;bottom:0;height:3px;width:100%;opacity:.9}
  .kpi.ok .num{color:var(--ok)} .kpi.ok .bar{background:var(--ok)}
  .kpi.warn .num{color:var(--warn)} .kpi.warn .bar{background:var(--warn)}
  .kpi.crit .num{color:var(--crit)} .kpi.crit .bar{background:var(--crit)}
  .kpi.unknown .num{color:var(--unknown)} .kpi.unknown .bar{background:var(--unknown)}
  .kpi.total .num{color:var(--txt)} .kpi.total .bar{background:linear-gradient(90deg,var(--accent),var(--accent2))}

  /* role columns */
  .roles{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  .role{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
        padding:0;backdrop-filter:blur(10px);overflow:hidden}
  .role h2{display:flex;align-items:center;gap:10px;margin:0;padding:16px 20px;
           font-size:15px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.02)}
  .role h2 .tag{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.5px}
  .role h2 .cnt{margin-left:auto;font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
  .role .body{padding:12px;display:flex;flex-direction:column;gap:8px;max-height:60vh;overflow:auto}

  /* host row */
  .host{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:11px;
        background:rgba(255,255,255,.025);border:1px solid transparent;cursor:pointer;
        transition:background .18s ease,border-color .18s ease,transform .18s ease}
  .host:hover{background:rgba(255,255,255,.055);border-color:var(--line);transform:translateX(2px)}
  .dot{width:11px;height:11px;border-radius:50%;flex:none}
  .dot.ok{background:var(--ok);box-shadow:var(--glow) var(--ok)}
  .dot.warn{background:var(--warn);box-shadow:var(--glow) var(--warn)}
  .dot.crit{background:var(--crit);box-shadow:var(--glow) var(--crit);animation:beat 1.1s ease-in-out infinite}
  .dot.unknown{background:var(--unknown);opacity:.6}
  .host .name{font-weight:600}
  .host .ip{color:var(--dim);font-family:var(--mono);font-size:12px;margin-left:2px}
  .host .chips{margin-left:auto;display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
  .chip{font-size:10.5px;padding:2px 7px;border-radius:6px;font-family:var(--mono);
        border:1px solid var(--line);color:var(--muted);white-space:nowrap}
  .chip.ok{color:var(--ok);border-color:rgba(40,209,124,.3)}
  .chip.warn{color:var(--warn);border-color:rgba(245,185,66,.3)}
  .chip.crit{color:var(--crit);border-color:rgba(255,84,112,.35)}
  .chip.unknown{color:var(--unknown)}

  /* skeleton */
  .skel{height:56px;border-radius:11px;background:linear-gradient(100deg,
        rgba(255,255,255,.03) 30%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.03) 70%);
        background-size:200% 100%;animation:shimmer 1.3s infinite}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

  /* token gate */
  .gate{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;
        background:rgba(7,11,20,.86);backdrop-filter:blur(8px)}
  .gate.show{display:flex}
  .gate .box{background:var(--panel-solid);border:1px solid var(--line);border-radius:var(--radius);
             padding:30px;width:360px;text-align:center}
  .gate h3{margin:0 0 6px} .gate p{color:var(--muted);margin:0 0 18px;font-size:13px}
  .gate input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--line);
              background:#0a0f1c;color:var(--txt);font-size:15px;font-family:var(--mono)}
  .gate button{margin-top:14px;width:100%;padding:12px;border:0;border-radius:10px;cursor:pointer;
               font-weight:700;font-size:15px;color:#08101f;
               background:linear-gradient(90deg,var(--accent),var(--accent2))}
  .gate .err{color:var(--crit);font-size:12.5px;margin-top:10px;min-height:16px}

  /* drawer */
  .drawer{position:fixed;top:0;right:0;height:100%;width:min(460px,92vw);z-index:40;
          background:var(--panel-solid);border-left:1px solid var(--line);
          transform:translateX(100%);transition:transform .3s cubic-bezier(.2,.8,.2,1);
          overflow:auto;box-shadow:-30px 0 60px rgba(0,0,0,.4)}
  .drawer.open{transform:translateX(0)}
  .drawer .dh{display:flex;align-items:center;gap:12px;padding:20px 24px;border-bottom:1px solid var(--line)}
  .drawer .dh .x{margin-left:auto;cursor:pointer;color:var(--muted);font-size:22px;line-height:1}
  .drawer .db{padding:18px 24px}
  .prow{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--line)}
  .prow .pn{font-weight:600} .prow .pd{color:var(--dim);font-size:12px}
  .prow .pv{margin-left:auto;font-family:var(--mono);font-size:13px}
  .badge{padding:3px 9px;border-radius:7px;font-size:11px;font-weight:700;text-transform:uppercase}
  .badge.ok{background:rgba(40,209,124,.16);color:var(--ok)}
  .badge.warn{background:rgba(245,185,66,.16);color:var(--warn)}
  .badge.crit{background:rgba(255,84,112,.16);color:var(--crit)}
  .badge.unknown{background:rgba(91,104,133,.18);color:var(--unknown)}

  .phase{margin-top:30px;text-align:center;color:var(--dim);font-size:12px}
  .phase b{color:var(--muted)}
  @media(max-width:980px){.kpis{grid-template-columns:repeat(2,1fr)}.roles{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="gate" id="gate">
  <div class="box">
    <div class="beat" style="margin:0 auto 14px"></div>
    <h3>Pulse</h3>
    <p>Enter access token to view the fleet</p>
    <input id="tok" type="password" placeholder="access token" autocomplete="off"
           onkeydown="if(event.key==='Enter')saveToken()">
    <button onclick="saveToken()">Unlock</button>
    <div class="err" id="gateErr"></div>
  </div>
</div>

<header>
  <div class="logo"><span class="beat"></span> <span>Pulse</span></div>
  <div class="fleet-pill" id="fleetPill">—</div>
  <div class="spacer"></div>
  <div class="meta">
    <div>Sweep <b id="sweepMs">—</b></div>
    <div>Updated <b id="updated">—</b></div>
    <div class="live"><i></i> live</div>
  </div>
</header>

<main>
  <div class="kpis" id="kpis"></div>
  <div class="roles" id="roles"></div>
  <div class="phase">Phase 1 · <b>Observer</b> — read-only. No write access to production. ·
       <span id="ver"></span></div>
</main>

<div class="drawer" id="drawer">
  <div class="dh">
    <span class="beat" id="drawerDot"></span>
    <div><div id="drawerName" style="font-weight:700"></div>
         <div id="drawerIp" style="color:var(--dim);font-family:var(--mono);font-size:12px"></div></div>
    <span class="x" onclick="closeDrawer()">×</span>
  </div>
  <div class="db" id="drawerBody"></div>
</div>

<script>
const ROLE_LABEL = {IVG:"FreeSWITCH", OPS:"OpenSIPS", VOSS:"VOS3000"};
const PILL_COLOR = {healthy:"var(--ok)", warning:"var(--warn)", critical:"var(--crit)",
                    degraded:"var(--unknown)"};
let TOKEN = localStorage.getItem("pulse_token") || "";
let timer = null;

function hdrs(){ return TOKEN ? {"X-Pulse-Token":TOKEN} : {}; }

async function api(path){
  const r = await fetch(path, {headers:hdrs()});
  if(r.status === 401){ throw {auth:true}; }
  if(!r.ok) throw new Error("http "+r.status);
  return r.json();
}

function saveToken(){
  const v = document.getElementById("tok").value.trim();
  TOKEN = v; localStorage.setItem("pulse_token", v);
  document.getElementById("gate").classList.remove("show");
  document.getElementById("gateErr").textContent = "";
  boot();
}
function showGate(msg){
  document.getElementById("gate").classList.add("show");
  if(msg) document.getElementById("gateErr").textContent = msg;
}

function ago(ts){
  if(!ts) return "never";
  const s = Math.max(0, Math.floor(Date.now()/1000 - ts));
  if(s<60) return s+"s ago"; if(s<3600) return Math.floor(s/60)+"m ago";
  return Math.floor(s/3600)+"h ago";
}

function kpi(cls,label,n){
  return `<div class="kpi ${cls}"><div class="label">${label}</div>
          <div class="num" data-n="${n}">0</div><div class="bar"></div></div>`;
}
function countUp(){
  document.querySelectorAll(".kpi .num").forEach(el=>{
    const target = +el.dataset.n || 0; let cur = 0;
    const step = Math.max(1, Math.ceil(target/18));
    const t = setInterval(()=>{ cur += step; if(cur>=target){cur=target;clearInterval(t)}
      el.textContent = cur; }, 22);
  });
}

function hostRow(h){
  const chips = h.probes.map(p =>
    `<span class="chip ${p.status}">${p.name} ${p.value||""}</span>`).join("");
  return `<div class="host" onclick='openHost(${JSON.stringify(h.hostname)})'>
    <span class="dot ${h.status}"></span>
    <span class="name">${h.hostname}</span><span class="ip">${h.ip}</span>
    <span class="chips">${chips}</span></div>`;
}

function render(data){
  // fleet pill
  const pill = document.getElementById("fleetPill");
  pill.textContent = data.fleet_status;
  pill.style.color = PILL_COLOR[data.fleet_status] || "var(--muted)";
  pill.style.borderColor = (PILL_COLOR[data.fleet_status]||"var(--line)");

  // KPIs
  const t = data.totals;
  document.getElementById("kpis").innerHTML =
    kpi("total","Hosts",t.hosts) + kpi("ok","Healthy",t.ok) +
    kpi("warn","Warning",t.warn) + kpi("crit","Critical",t.crit) +
    kpi("unknown","Unknown",t.unknown);
  countUp();

  // role columns
  const byRole = {IVG:[],OPS:[],VOSS:[]};
  data.hosts.forEach(h => (byRole[h.role]||(byRole[h.role]=[])).push(h));
  const order = ["OPS","IVG","VOSS"];
  document.getElementById("roles").innerHTML = order.map(role=>{
    const list = byRole[role]||[]; const r = data.roles[role]||{total:0,crit:0,warn:0};
    const rows = list.length ? list.map(hostRow).join("")
      : `<div style="color:var(--dim);padding:14px;text-align:center">no ${role} hosts in inventory</div>`;
    return `<div class="role"><h2><span class="dot ${r.crit?'crit':r.warn?'warn':'ok'}"></span>
      ${ROLE_LABEL[role]} <span class="tag">${role}</span>
      <span class="cnt">${r.total||0} hosts</span></h2>
      <div class="body">${rows}</div></div>`;
  }).join("");

  document.getElementById("updated").textContent = ago(data.ts);
}

let LAST = {};
async function refresh(){
  try{
    const [fleet, st] = await Promise.all([api("/api/fleet"), api("/api/status")]);
    LAST = fleet; render(fleet);
    document.getElementById("sweepMs").textContent = (st.sweep_ms||0)+"ms";
    document.getElementById("ver").textContent = "v"+st.version;
  }catch(e){
    if(e && e.auth){ clearInterval(timer); showGate("Invalid token."); }
  }
}

async function openHost(name){
  const h = (LAST.hosts||[]).find(x=>x.hostname===name); if(!h) return;
  document.getElementById("drawerName").textContent = h.hostname;
  document.getElementById("drawerIp").textContent = h.ip+" · "+ROLE_LABEL[h.role];
  const dot = document.getElementById("drawerDot");
  dot.style.background = `var(--${h.status})`; dot.style.boxShadow = `var(--glow) var(--${h.status})`;
  document.getElementById("drawerBody").innerHTML = h.probes.map(p=>
    `<div class="prow"><div><div class="pn">${p.name}</div></div>
     <span class="pv">${p.value||"—"}</span>
     <span class="badge ${p.status}">${p.status}</span></div>`).join("");
  document.getElementById("drawer").classList.add("open");
}
function closeDrawer(){ document.getElementById("drawer").classList.remove("open"); }

function boot(){
  document.getElementById("roles").innerHTML =
    `<div class="role"><div class="body">${'<div class="skel"></div>'.repeat(4)}</div></div>`.repeat(3);
  refresh();
  clearInterval(timer); timer = setInterval(refresh, 10000);  // stale-while-revalidate
}

// first load: try without token; if 401, show gate
(async function(){
  try{ await api("/api/status"); boot(); }
  catch(e){ if(e&&e.auth) showGate(); else boot(); }
})();
</script>
</body>
</html>
