# Pulse credentials — STRUCTURE ONLY. Do NOT put real secrets in the repo.
#
# In production these come from Coolify environment variables / secrets, not a
# file. This example only documents the shape the app expects.
#
# Two shared-password environments + one per-box environment:
#
#   IVG_SSH_USER      / IVG_SSH_PASSWORD    -> shared across FreeSWITCH fleet
#   OPS_SSH_USER      / OPS_SSH_PASSWORD    -> shared across OpenSIPS fleet
#   VOSS_SSH_USER     / VOSS_CREDS_JSON     -> per-box VOS3000 passwords, keyed by IP
#
# VOSS_CREDS_JSON example (single line in the env var):
#   {"198.23.213.202":"REDACTED","74.81.44.242":"REDACTED"}
#
# Preferred long-term (Phase 2+): a dedicated least-privilege `pulse` SSH key
# instead of passwords — set PULSE_SSH_KEY (PEM contents) and drop the passwords.

IVG_SSH_USER: root
OPS_SSH_USER: root
VOSS_SSH_USER: root
